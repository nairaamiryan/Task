<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Light Switch</title>

</head>
<body>

<div class="container">

    <div class="lamp-area">

        <div class="cable"></div>

        <div class="lamp"></div>

        <div class="light"></div>

    </div>

    <div class="person sad" id="person">

        <div class="face">
            <div class="eye left"></div>
            <div class="eye right"></div>
            <div class="mouth"></div>
        </div>

        <div class="body"></div>

        <div class="arms"></div>

        <div class="legs">
            <div class="leg"></div>
            <div class="leg"></div>
        </div>

        <h2 id="status">🙍 I'm sad...</h2>

    </div>

    <button id="switchBtn">Turn ON</button>

</div>
<script src="script.js"></script>
</body>
</html>
